openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PB&J API
servers:
  - url: /api
tags:
  - name: health
  - name: tournaments
  - name: players
  - name: matches
  - name: openplay
  - name: storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tournaments:
    post:
      operationId: createTournament
      tags: [tournaments]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentWithToken"

  /tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"
    patch:
      operationId: updateTournament
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/start:
    post:
      operationId: startTournament
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/players:
    post:
      operationId: joinTournament
      tags: [players]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerWithToken"

  /tournaments/{tournamentId}/players/shuffle:
    post:
      operationId: shufflePlayers
      tags: [players]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  /tournaments/{tournamentId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [players]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: removePlayer
      tags: [players]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /profile/me:
    get:
      operationId: getMyProfile
      tags: [profile]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileStats"
        "401":
          description: Unauthorized

  /players/{playerId}/stats:
    get:
      operationId: getPlayerStats
      tags: [players]
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStats"

  /tournaments/{tournamentId}/matches/{matchId}:
    patch:
      operationId: updateMatch
      tags: [matches]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/matches/undo:
    post:
      operationId: undoLastMatch
      tags: [matches]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/summary:
    get:
      operationId: getTournamentSummary
      tags: [tournaments]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentSummary"

  /tournaments/{tournamentId}/open-play:
    get:
      operationId: getOpenPlayPool
      tags: [openplay]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenPlayState"

  /tournaments/{tournamentId}/open-play/matches:
    post:
      operationId: logOpenPlayMatch
      tags: [openplay]
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenPlayMatchInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenPlayState"

  /sessions:
    post:
      operationId: createSession
      tags: [sessions]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithToken"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionFull"
    patch:
      operationId: updateSession
      tags: [sessions]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionFull"

  /sessions/{sessionId}/players:
    post:
      operationId: addSessionPlayer
      tags: [sessions]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSessionPlayerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionFull"

  /sessions/{sessionId}/matches:
    post:
      operationId: logSessionMatch
      tags: [sessions]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionMatchInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionFull"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Tournament:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TournamentWithToken:
      type: object
      required: [id, name, status, createdAt, hostToken]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        hostToken:
          type: string

    TournamentFull:
      type: object
      required: [id, name, status, createdAt, players, matches]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"

    TournamentSummary:
      type: object
      required: [tournamentId, champion, runnerUp, totalMatches, playerCount]
      properties:
        tournamentId:
          type: string
        champion:
          $ref: "#/components/schemas/Player"
        runnerUp:
          $ref: "#/components/schemas/Player"
        thirdPlace:
          oneOf:
            - $ref: "#/components/schemas/Player"
            - type: "null"
        totalMatches:
          type: integer
        playerCount:
          type: integer
        durationMinutes:
          type: ["integer", "null"]

    Player:
      type: object
      required: [id, tournamentId, firstName, lastName, seed, joinedAt, eloRating]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        partnerName:
          type: ["string", "null"]
        teamName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        eloRating:
          type: number
        rankTitle:
          type: ["string", "null"]
        rankEmoji:
          type: ["string", "null"]
        seed:
          type: integer
        joinedAt:
          type: string
          format: date-time

    PlayerWithToken:
      type: object
      required: [id, tournamentId, firstName, lastName, seed, joinedAt, eloRating, playerToken]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        partnerName:
          type: ["string", "null"]
        teamName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        eloRating:
          type: number
        rankTitle:
          type: ["string", "null"]
        rankEmoji:
          type: ["string", "null"]
        seed:
          type: integer
        joinedAt:
          type: string
          format: date-time
        playerToken:
          type: string

    ProfileStats:
      type: object
      required: [eloRating, rankTitle, rankEmoji, totalWins, totalLosses, matchesPlayed, winPct, tournamentWins, tournamentsPlayed, recentMatches]
      properties:
        eloRating:
          type: number
        rankTitle:
          type: string
        rankEmoji:
          type: string
        totalWins:
          type: integer
        totalLosses:
          type: integer
        matchesPlayed:
          type: integer
        winPct:
          type: number
        tournamentWins:
          type: integer
        tournamentsPlayed:
          type: integer
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/MatchHistoryEntry"

    PlayerStats:
      type: object
      required: [player, wins, losses, matchesPlayed, winPct, tournamentWins, recentMatches]
      properties:
        player:
          $ref: "#/components/schemas/Player"
        wins:
          type: integer
        losses:
          type: integer
        matchesPlayed:
          type: integer
        winPct:
          type: number
        tournamentWins:
          type: integer
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/MatchHistoryEntry"

    MatchHistoryEntry:
      type: object
      required: [matchId, tournamentId, tournamentName, bracket, round, opponentName, won, completedAt]
      properties:
        matchId:
          type: string
        tournamentId:
          type: string
        tournamentName:
          type: string
        bracket:
          type: string
        round:
          type: integer
        opponentName:
          type: string
        won:
          type: boolean
        scoreOne:
          type: ["integer", "null"]
        scoreTwo:
          type: ["integer", "null"]
        completedAt:
          type: string

    Match:
      type: object
      required: [id, tournamentId, round, matchNumber, bracket, status, isBye]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        round:
          type: integer
        matchNumber:
          type: integer
        bracket:
          type: string
          enum: [winner]
        playerOneId:
          type: ["string", "null"]
        playerTwoId:
          type: ["string", "null"]
        winnerId:
          type: ["string", "null"]
        scoreOne:
          type: ["integer", "null"]
        scoreTwo:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, active, completed, bye]
        isBye:
          type: boolean
        nextWinnerMatchId:
          type: ["string", "null"]
        nextWinnerSlot:
          type: ["string", "null"]
        nextLoserMatchId:
          type: ["string", "null"]
        nextLoserSlot:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
          format: date-time

    OpenPlayState:
      type: object
      required: [pool, recentMatches]
      properties:
        pool:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/OpenPlayMatchRecord"

    OpenPlayMatchRecord:
      type: object
      required: [id, winnerTeam, playedAt]
      properties:
        id:
          type: string
        winnerTeam:
          type: integer
        scoreOne:
          type: ["integer", "null"]
        scoreTwo:
          type: ["integer", "null"]
        teamOnePlayers:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        teamTwoPlayers:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        playedAt:
          type: string
          format: date-time

    OpenPlayMatchInput:
      type: object
      required: [hostToken, teamOnePOneId, teamTwoPOneId, winnerTeam]
      properties:
        hostToken:
          type: string
        teamOnePOneId:
          type: string
        teamOnePTwoId:
          type: string
        teamTwoPOneId:
          type: string
        teamTwoPTwoId:
          type: string
        winnerTeam:
          type: integer
        scoreOne:
          type: integer
        scoreTwo:
          type: integer

    TournamentInput:
      type: object
      properties:
        name:
          type: string

    TournamentUpdate:
      type: object
      properties:
        name:
          type: string
        registrationLocked:
          type: boolean
        hostToken:
          type: string

    PlayerInput:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        partnerName:
          type: string
        teamName:
          type: string
        skillLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    PlayerUpdate:
      type: object
      properties:
        playerToken:
          type: string
        hostToken:
          type: string
        teamName:
          type: string
        avatarUrl:
          type: string

    MatchUpdate:
      type: object
      required: [hostToken]
      properties:
        hostToken:
          type: string
        winnerId:
          type: string
        scoreOne:
          type: integer
        scoreTwo:
          type: integer

    HostTokenInput:
      type: object
      required: [hostToken]
      properties:
        hostToken:
          type: string

    SessionInput:
      type: object
      properties:
        name:
          type: string

    SessionUpdate:
      type: object
      required: [hostToken]
      properties:
        name:
          type: string
        hostToken:
          type: string

    SessionWithToken:
      type: object
      required: [id, name, status, createdAt, hostToken]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, completed]
        createdAt:
          type: string
          format: date-time
        hostToken:
          type: string

    SessionPlayer:
      type: object
      required: [id, sessionId, firstName, lastName, eloRating, rankTitle, rankEmoji, joinedAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        teamName:
          type: ["string", "null"]
        eloRating:
          type: integer
        rankTitle:
          type: string
        rankEmoji:
          type: string
        joinedAt:
          type: string
          format: date-time

    SessionMatchRecord:
      type: object
      required: [id, winnerTeam, playedAt, team1Players, team2Players]
      properties:
        id:
          type: string
        winnerTeam:
          type: integer
        scoreOne:
          type: ["integer", "null"]
        scoreTwo:
          type: ["integer", "null"]
        team1Players:
          type: array
          items:
            $ref: "#/components/schemas/SessionPlayer"
        team2Players:
          type: array
          items:
            $ref: "#/components/schemas/SessionPlayer"
        playedAt:
          type: string
          format: date-time

    SessionFull:
      type: object
      required: [id, name, status, createdAt, players, recentMatches]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, completed]
        createdAt:
          type: string
          format: date-time
        players:
          type: array
          items:
            $ref: "#/components/schemas/SessionPlayer"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/SessionMatchRecord"

    AddSessionPlayerBody:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        teamName:
          type: string

    SessionMatchInput:
      type: object
      required: [hostToken, team1P1Id, team2P1Id, winnerTeam]
      properties:
        hostToken:
          type: string
        team1P1Id:
          type: string
        team1P2Id:
          type: string
        team2P1Id:
          type: string
        team2P2Id:
          type: string
        winnerTeam:
          type: integer
        scoreOne:
          type: integer
        scoreTwo:
          type: integer

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
