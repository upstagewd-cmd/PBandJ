openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bracket Boss API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: tournaments
  - name: players
  - name: matches

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tournaments:
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a new tournament
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Tournament created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentWithToken"

  /tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get tournament details
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tournament details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"
        "404":
          description: Not found

    patch:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/start:
    post:
      operationId: startTournament
      tags: [tournaments]
      summary: Start tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: Tournament started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/players:
    post:
      operationId: joinTournament
      tags: [players]
      summary: Join a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Player joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerWithToken"

  /tournaments/{tournamentId}/players/shuffle:
    post:
      operationId: shufflePlayers
      tags: [players]
      summary: Shuffle player order (host only)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: Players shuffled
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  /tournaments/{tournamentId}/players/{playerId}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update team name (player token required)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Player updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

    delete:
      operationId: removePlayer
      tags: [players]
      summary: Remove a player (host only)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: Player removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /tournaments/{tournamentId}/matches/{matchId}:
    patch:
      operationId: updateMatch
      tags: [matches]
      summary: Set winner or update scores
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdate"
      responses:
        "200":
          description: Match updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/matches/undo:
    post:
      operationId: undoLastMatch
      tags: [matches]
      summary: Undo the last completed match (host only)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostTokenInput"
      responses:
        "200":
          description: Match undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentFull"

  /tournaments/{tournamentId}/summary:
    get:
      operationId: getTournamentSummary
      tags: [tournaments]
      summary: Get championship summary
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Championship summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Tournament:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TournamentWithToken:
      type: object
      required: [id, name, status, createdAt, hostToken]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        hostToken:
          type: string

    TournamentFull:
      type: object
      required: [id, name, status, createdAt, players, matches]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [lobby, active, completed]
        registrationLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"

    TournamentSummary:
      type: object
      required: [tournamentId, champion, runnerUp, totalMatches, playerCount]
      properties:
        tournamentId:
          type: string
        champion:
          $ref: "#/components/schemas/Player"
        runnerUp:
          $ref: "#/components/schemas/Player"
        thirdPlace:
          oneOf:
            - $ref: "#/components/schemas/Player"
            - type: "null"
        totalMatches:
          type: integer
        playerCount:
          type: integer
        durationMinutes:
          type: ["integer", "null"]

    Player:
      type: object
      required: [id, tournamentId, firstName, lastName, seed, joinedAt]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        partnerName:
          type: ["string", "null"]
        teamName:
          type: ["string", "null"]
        seed:
          type: integer
        joinedAt:
          type: string
          format: date-time

    PlayerWithToken:
      type: object
      required: [id, tournamentId, firstName, lastName, seed, joinedAt, playerToken]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        partnerName:
          type: ["string", "null"]
        teamName:
          type: ["string", "null"]
        seed:
          type: integer
        joinedAt:
          type: string
          format: date-time
        playerToken:
          type: string

    Match:
      type: object
      required: [id, tournamentId, round, matchNumber, bracket, status, isBye]
      properties:
        id:
          type: string
        tournamentId:
          type: string
        round:
          type: integer
        matchNumber:
          type: integer
        bracket:
          type: string
          enum: [winner, loser, grand_finals, grand_finals_reset]
        playerOneId:
          type: ["string", "null"]
        playerTwoId:
          type: ["string", "null"]
        winnerId:
          type: ["string", "null"]
        scoreOne:
          type: ["integer", "null"]
        scoreTwo:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, active, completed, bye]
        isBye:
          type: boolean
        nextWinnerMatchId:
          type: ["string", "null"]
        nextWinnerSlot:
          type: ["string", "null"]
        nextLoserMatchId:
          type: ["string", "null"]
        nextLoserSlot:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
          format: date-time

    TournamentInput:
      type: object
      properties:
        name:
          type: string

    TournamentUpdate:
      type: object
      properties:
        name:
          type: string
        registrationLocked:
          type: boolean
        hostToken:
          type: string

    PlayerInput:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        partnerName:
          type: string
        teamName:
          type: string

    PlayerUpdate:
      type: object
      required: [playerToken]
      properties:
        playerToken:
          type: string
        teamName:
          type: string

    MatchUpdate:
      type: object
      required: [hostToken]
      properties:
        hostToken:
          type: string
        winnerId:
          type: string
        scoreOne:
          type: integer
        scoreTwo:
          type: integer

    HostTokenInput:
      type: object
      required: [hostToken]
      properties:
        hostToken:
          type: string
