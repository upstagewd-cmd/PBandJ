kind = "web"
previewPath = "/"
title = "PB&J"
version = "1.0.0"
id = "artifacts/bracket-boss"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18981

[services.development]
run = "pnpm --filter @workspace/bracket-boss run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bracket-boss", "run", "build" ]
publicDir = "artifacts/bracket-boss/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18981"
BASE_PATH = "/"
