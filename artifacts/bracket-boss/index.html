<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PB&amp;J</title>
    <meta name="description" content="PB&amp;J — Faith. Fellowship. Friendly Competition." />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#111111" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PB&amp;J" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />

    <meta property="og:title" content="PB&amp;J" />
    <meta property="og:description" content="Faith. Fellowship. Friendly Competition." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PB&amp;J" />
    <meta name="twitter:description" content="Faith. Fellowship. Friendly Competition." />
    <link rel="icon" type="image/png" href="/logo-favicon.png" />
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 15%, #f4f7e8 0%, #ffffff 45%);
        z-index: 9999;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .app-splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .app-splash-logo {
        width: 64px;
        height: 64px;
        border-radius: 14px;
      }

      .app-splash-title {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #111111;
      }

      .app-splash-subtitle {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading PB and J app">
      <div class="app-splash-card">
        <img class="app-splash-logo" src="/logo-favicon.png" alt="PB and J" />
        <p class="app-splash-title">PB&amp;J</p>
        <p class="app-splash-subtitle">Loading your court...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
