<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PB&amp;J — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, system-ui, sans-serif;
        background: #0a0a0f;
        color: #fafafa;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      img { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
      h1 span { color: #f96422; }
      p { color: #a1a1aa; font-size: 0.925rem; line-height: 1.6; max-width: 280px; margin-bottom: 1.5rem; }
      button {
        background: #f96422;
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem 2rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: #fb7c45; }
    </style>
  </head>
  <body>
    <img src="icons/icon-192.png" alt="PB&amp;J logo" />
    <h1>PB<span>&amp;J</span> is offline</h1>
    <p>No internet connection detected. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </body>
</html>
